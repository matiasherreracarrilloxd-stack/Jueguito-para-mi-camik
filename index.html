<!DOCTYPE html>
<html>
<head>
<title>Juego para Cami</title>
<style>
body{
margin:0;
overflow:hidden;
background:#7ec0ee;
}

canvas{
display:block;
margin:auto;
background:#7ec0ee;
}
</style>
</head>

<body>

<canvas id="game" width="1200" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let gravity = 0.6

let player = {
x:50,
y:350,
width:40,
height:50,
dx:0,
dy:0,
speed:4,
jump:-12
}

let boss = {
x:1000,
y:330,
width:50,
height:60,
direction:1,
hp:3,
jumpTimer:0,
shootTimer:0,
dy:0
}

let bullets = []

let platforms = [
{x:0,y:400,width:1200,height:100},
{x:200,y:300,width:150,height:20},
{x:450,y:250,width:150,height:20},
{x:700,y:300,width:150,height:20}
]

let keys = {}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function shoot(x,y){
bullets.push({x:x,y:y,width:10,height:10})
}

function update(){

if(keys["ArrowRight"]) player.dx = player.speed
else if(keys["ArrowLeft"]) player.dx = -player.speed
else player.dx = 0

if(keys[" "] && player.dy==0){
player.dy = player.jump
}

player.dy += gravity
player.x += player.dx
player.y += player.dy

platforms.forEach(p=>{
if(player.x < p.x+p.width &&
player.x+player.width > p.x &&
player.y+player.height < p.y+20 &&
player.y+player.height > p.y){

player.y = p.y-player.height
player.dy = 0
}
})

boss.x += boss.direction*2
if(boss.x > 1100 || boss.x < 850) boss.direction *= -1

boss.jumpTimer++
boss.shootTimer++

if(boss.jumpTimer > 120){
boss.dy = -10
boss.jumpTimer = 0

shoot(boss.x,boss.y) // dispara al saltar
}

boss.dy += gravity
boss.y += boss.dy

if(boss.y > 330){
boss.y = 330
boss.dy = 0
}

if(boss.shootTimer > 120){ // 2 segundos
shoot(boss.x,boss.y)
boss.shootTimer = 0
}

bullets.forEach(b=>{
b.x -= 4
})

bullets = bullets.filter(b=>b.x > 0)

bullets.forEach(b=>{
if(
player.x < b.x+b.width &&
player.x+player.width > b.x &&
player.y < b.y+b.height &&
player.y+player.height > b.y
){
player.x = 50
player.y = 350
}
})

if(
player.x < boss.x + boss.width &&
player.x + player.width > boss.x &&
player.y + player.height < boss.y + 20
){
boss.hp--
player.dy = -10
player.x = 50
player.y = 350
}

if(boss.hp <=0){

ctx.fillStyle="white"
ctx.fillRect(200,100,800,300)

ctx.fillStyle="black"
ctx.font="28px Arial"

ctx.fillText("Cami, Felicidades por ganar ❤️",300,180)
ctx.fillText("Espero que te haya gustado este mini juego",230,230)
ctx.fillText("Quiero decirte que te amo mucho",300,270)
ctx.fillText("Te amo con todo mi corazón",300,310)
ctx.fillText("Quiero que seas mi única mujercita",260,350)

return
}

draw()

requestAnimationFrame(update)
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="brown"
platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.width,p.height)
})

ctx.fillStyle="red"
ctx.fillRect(player.x,player.y,player.width,player.height)

ctx.fillStyle="purple"
ctx.fillRect(boss.x,boss.y,boss.width,boss.height)

ctx.fillStyle="black"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,b.width,b.height)
})

}

update()

</script>

</body>
</html>
